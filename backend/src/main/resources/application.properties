# Spring Boot Server Config
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_facility
spring.datasource.username=${DB_USERNAME:subasthican}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Application Name
spring.application.name=Smart Facility Management System

# Frontend callback URL for OAuth success redirect
frontend.app-url=http://localhost:3000

# Google OAuth2 client configuration (set real values via environment variables)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-dev-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-dev-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Local AI (Ollama) configuration
ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ai.ollama.model=${OLLAMA_MODEL:llama3.2}
